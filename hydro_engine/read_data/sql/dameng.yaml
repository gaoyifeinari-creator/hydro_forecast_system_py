# 达梦 DM：测站小时表查询。模式、表名、列名均在此维护（例如 ``FROM 模式名.表名``）；JDBC 配置只提供连接。
# 默认键 hourdb_hourly_range 由 load_station_hourly_frame 使用；若需改名请在代码常量或旧版 station_hourly 中覆盖 sql_key。

hourdb_hourly_range: |
  SELECT SENID, TIME, V, AVGV
  FROM WDS.HOURDB
  WHERE TIME >= :t_start AND TIME <= :t_end
  ORDER BY SENID, TIME

hourdb_hourly_range_in: |
  SELECT SENID, TIME, V, AVGV
  FROM WDS.HOURDB
  WHERE TIME >= :t_start AND TIME <= :t_end AND SENID IN :senids
  ORDER BY SENID, TIME

hourdb_hourly_station: |
  SELECT SENID, TIME, V, AVGV
  FROM WDS.HOURDB
  WHERE TIME >= :t_start AND TIME <= :t_end AND SENID = :senid
  ORDER BY TIME

daydb_daily_range: |
  SELECT SENID, TIME, V, AVGV
  FROM WDS.DAYDB
  WHERE TIME >= :t_start AND TIME <= :t_end
  ORDER BY SENID, TIME

daydb_daily_range_in: |
  SELECT SENID, TIME, V, AVGV
  FROM WDS.DAYDB
  WHERE TIME >= :t_start AND TIME <= :t_end AND SENID IN :senids
  ORDER BY SENID, TIME

daydb_daily_station: |
  SELECT SENID, TIME, V, AVGV
  FROM WDS.DAYDB
  WHERE TIME >= :t_start AND TIME <= :t_end AND SENID = :senid
  ORDER BY TIME

# 预报面雨量（WEA_GFSFORRAIN）：
# - 两步法（达梦兼容）：先查最新 FTIME，再查明细
# - 子查询法：一次 SQL 取最新 FTIME 明细
#
# 字段约定：
# REGID, SUBTYPE, TIMESPAN, FTIME, BTIME, AVERPRE, MINPRE, MAXPRE
forecast_rain_latest_ftime: |
  SELECT MAX(FTIME) AS FTIME
  FROM WDS.WEA_GFSFORRAIN
  WHERE FTIME >= :ftime_begin
    AND FTIME < :ftime_end
    AND SUBTYPE = :subtype
    AND TIMESPAN = :timespan

forecast_rain_latest_records_in: |
  SELECT REGID, SUBTYPE, TIMESPAN, FTIME, BTIME, AVERPRE, MINPRE, MAXPRE
  FROM WDS.WEA_GFSFORRAIN
  WHERE REGID IN :regids
    AND SUBTYPE = :subtype
    AND TIMESPAN = :timespan
    AND FTIME = :max_ftime
    AND BTIME >= :read_begin
    AND BTIME <= :read_end
  ORDER BY REGID, BTIME

forecast_rain_latest_records_subquery_in: |
  SELECT REGID, SUBTYPE, TIMESPAN, FTIME, BTIME, AVERPRE, MINPRE, MAXPRE
  FROM WDS.WEA_GFSFORRAIN
  WHERE REGID IN :regids
    AND SUBTYPE = :subtype
    AND TIMESPAN = :timespan
    AND FTIME = (
      SELECT MAX(FTIME)
      FROM WDS.WEA_GFSFORRAIN
      WHERE FTIME >= :ftime_begin
        AND FTIME < :ftime_end
        AND SUBTYPE = :subtype
        AND TIMESPAN = :timespan
    )
    AND BTIME >= :read_begin
    AND BTIME <= :read_end
  ORDER BY REGID, BTIME
